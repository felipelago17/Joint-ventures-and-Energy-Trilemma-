name: Handle Unsubscription Request

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  remove-subscriber:
    if: contains(github.event.issue.labels.*.name, 'unsubscription')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract email from issue body
        id: extract
        run: |
          EMAIL=$(echo "${{ github.event.issue.body }}" \
            | grep -A1 "Email address to remove" \
            | tail -1 \
            | tr -d '[:space:]')
          echo "email=$EMAIL" >> $GITHUB_OUTPUT

      - name: Remove email from subscribers file
        run: |
          EMAIL="${{ steps.extract.outputs.email }}"
          if grep -qxF "$EMAIL" data/subscribers.txt 2>/dev/null; then
            grep -vxF "$EMAIL" data/subscribers.txt > data/subscribers.tmp \
              && mv data/subscribers.tmp data/subscribers.txt
            echo "Removed: $EMAIL"
          else
            echo "Not found: $EMAIL"
          fi

      - name: Commit updated subscriber list
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/subscribers.txt
          git diff --cached --quiet || git commit -m "Remove subscriber: ${{ steps.extract.outputs.email }}"
          git push

      - name: Close issue with confirmation comment
        uses: actions/github-script@v7
        with:
          script: |
            const email = `${{ steps.extract.outputs.email }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Unsubscribed.** **${email}** has been removed from the digest.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
