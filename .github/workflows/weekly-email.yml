name: Weekly Email Digest

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday at 08:00 UTC
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history for 7-day log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests markdown --quiet

      - name: Send weekly email digest
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SUBSCRIBERS:      ${{ secrets.SUBSCRIBERS }}
          SENDER_EMAIL:     ${{ vars.SENDER_EMAIL }}
        run: python .github/scripts/send_weekly_email.py
