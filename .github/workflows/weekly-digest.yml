name: Weekly Email Digest

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday at 08:00 UTC
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history for 7-day log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send weekly email digest
        env:
          GMAIL_USER:         felchagas@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENTS:  ${{ secrets.DIGEST_RECIPIENTS }}
        run: python .github/scripts/send_digest_email.py
